- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: Linux, shell, ansible, terraform
    tagslist:
      name: ansible
      project: roboshop
      component: catalogue  
  tasks:
   - name: greetings
     ansible.builtin.debug:
       msg: "Hi Amrutha, {{ GREETINGS | default('Good Morning') }}"

   - name: convert string to list
     ansible.builtin.debug:
       msg: "{{ topics | split(',') }}"

   - name: convert map to list
     ansible.builtin.debug:
       msg: "{{ tagslist | dict2items }}"    
         
