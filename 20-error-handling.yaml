- name: demo on error handling
  hosts: local
  connection: local
  become: yes
  tasks:
   - name: check user exists or not
     ansible.builtin.command: id roboshop
     register: user_ouput
     ignore_errors: true

   - name: print the ouput
     ansible.builtin.debug:
       msg: "{{ user_ouput }}"

   - name: create user
     ansible.builtin.command: useradd roboshop
     when: user_ouput.rc != 0    
